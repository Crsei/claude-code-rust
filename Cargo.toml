[package]
name = "claude-code-rs"
version = "0.1.0"
edition = "2021"
description = "Claude Code CLI - Rust implementation (lite)"

# ============================================================
# 核心类型 + 状态机
# ============================================================

[dependencies]
# 异步运行时
tokio = { version = "1", features = ["full"] }
futures = "0.3"
async-trait = "0.1"
async-stream = "0.3"
tokio-stream = "0.1"
tokio-util = "0.7"

# 序列化
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# 错误处理
anyhow = "1"
thiserror = "2"

# CLI 参数解析
clap = { version = "4", features = ["derive"] }

# UUID
uuid = { version = "1", features = ["v4", "serde"] }

# 时间处理
chrono = "0.4"

# LRU 缓存
lru = "0.12"

# 日志
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# LSP 协议类型
lsp-types = "0.97"

# ============================================================
# 本地工具系统
# ============================================================

# 文件搜索 & 路径
glob = "0.3"
ignore = "0.4"
walkdir = "2"
dirs = "6"

# 正则表达式
regex = "1"

# Git 操作
git2 = { version = "0.19", default-features = false, features = ["https"] }

# 文本 Diff
similar = "2"

# 进程管理
shell-words = "1"

# ============================================================
# 终端 UI
# ============================================================

ratatui = "0.29"
crossterm = "0.28"

# 语法高亮
syntect = "5"

# 文本处理
textwrap = "0.16"
unicode-width = "0.2"
strip-ansi-escapes = "0.2"

# Markdown 渲染
pulldown-cmark = "0.12"

# 哈希 (审计记录完整性)
sha2 = "0.10"
hex = "0.4"

# 编码
base64 = "0.22"
bytes = "1"
url = "2"
semver = "1"

# ============================================================
# 网络 / API / 认证
# ============================================================

# HTTP 客户端
reqwest = { version = "0.12", features = ["json", "stream", "rustls-tls"] }

# 认证
keyring = "3"
dotenvy = "0.15.7"

# 同步原语 (无 lock poisoning)
parking_lot = "0.12"

# ============================================================
# E2E 测试
# ============================================================

[dev-dependencies]
assert_cmd = "2"
predicates = "3"
assert_fs = "1"
tempfile = "3"
sha2 = "0.10"
hex = "0.4"
serde_json = "1"
portable-pty = "0.9"
vt100 = "0.15"
which = "7"

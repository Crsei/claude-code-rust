name: CI Tests

on:
  push:
    branches: [rust-lite, main]
  pull_request:
    branches: [rust-lite, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Rust backend tests (Linux Docker) ─────────────────────
  test-rust-offline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build test image
        run: docker build --target tester -t cc-rust-test -f Dockerfile.ci .

      - name: Run offline tests
        run: docker run --rm --network=none cc-rust-test

  test-rust-live:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: test-rust-offline
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build test image
        run: docker build --target tester -t cc-rust-test -f Dockerfile.ci .

      - name: Run live API tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          docker run --rm \
            -e ANTHROPIC_API_KEY="$ANTHROPIC_API_KEY" \
            cc-rust-test \
            sh -c '
              for t in /app/tests/e2e_*; do
                [ -x "$t" ] || continue
                name=$(basename "$t" | sed "s/-[a-f0-9]*$//")
                echo "--- $name (live) ---"
                env "CARGO_BIN_EXE_claude-code-rs=/usr/local/bin/claude-code-rs" \
                  "$t" --ignored --test-threads=1 2>&1 || true
                echo ""
              done
            '

  # ── OpenTUI UI tests (Bun) ────────────────────────────────
  test-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build UI test image
        run: docker build -t cc-rust-ui-test -f ui/Dockerfile.test .

      - name: Run UI unit tests
        run: docker run --rm cc-rust-ui-test

  # ── Windows native tests ──────────────────────────────────
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Run offline tests
        run: cargo test --release -- --skip ignored

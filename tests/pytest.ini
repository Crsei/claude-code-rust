[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    slow: marks tests as slow (> 30s, e.g. API calls)
    requires_api: requires a valid API key
    windows_only: Windows-specific tests
    unix_only: Unix-specific tests
# Skip requires_api tests by default (run with: pytest -m requires_api)
addopts = -m "not requires_api"
